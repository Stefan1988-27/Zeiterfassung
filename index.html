<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeiterfassung</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:10px;
max-width:1000px;
margin:auto;
}

h1{text-align:center;}

.card{
background:#fff;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.box{
background:#fafafa;
padding:12px;
border-radius:10px;
text-align:center;
border:1px solid #eee;
}

.big{
font-size:30px;
font-weight:900;
}

.label{
font-size:14px;
font-weight:800;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#e0e0e0;
cursor:pointer;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
background:white;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#fafafa;
font-weight:800;
}

/* ADMIN */
.admin{
position:fixed;
bottom:10px;
right:10px;
width:320px;
background:white;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
border-radius:10px;
}

.hidden{display:none;}

</style>
</head>

<body>

<h1>Zeiterfassung</h1>

<!-- DISPLAY -->
<div class="card">

<div class="grid">

<div class="box">
<div class="label">START</div>
<div class="big" id="start">-</div>
</div>

<div class="box">
<div class="label">ENDE</div>
<div class="big" id="end">-</div>
</div>

<div class="box">
<div class="label">PAUSE</div>
<div class="big" id="pauseText">0</div>
</div>

</div>

<div class="box" style="margin-top:10px;">
<div class="label">ARBEITSZEIT</div>
<div class="big" id="live">0.00 h</div>
</div>

</div>

<!-- CONTROL -->
<div class="card row">
<button onclick="startWork()">▶ Kommen</button>
<button onclick="endWork()">⏹ Gehen</button>
</div>

<div class="card row">
<button onclick="addPause(5)">+5</button>
<button onclick="addPause(10)">+10</button>
<button onclick="addPause(15)">+15</button>
<button onclick="addPause(30)">+30</button>
<button onclick="resetPause()">↺</button>
</div>

<div class="card">
<button onclick="saveDay()" style="width:100%;font-weight:900;">
Speichern
</button>
</div>

<!-- WEEK -->
<div class="card">
<h3>Woche</h3>

<p>Ist: <span id="week">0</span> h</p>
<p>Soll: <span id="target">25</span> h</p>
<p>Überstunden: <span id="ot">0</span> h</p>
<p>Urlaub: <span id="vac">0</span> Tage</p>

</div>

<!-- TABLE -->
<div class="card">
<table>
<thead>
<tr>
<th>Datum</th>
<th>Start</th>
<th>Ende</th>
<th>Pause</th>
<th>Std</th>
<th>⚙</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- ADMIN -->
<div class="admin">
<h3>Admin</h3>

<input type="password" id="pw" placeholder="Passwort">
<button onclick="login()">Login</button>

<div id="panel" class="hidden">

<button onclick="closeAdmin()" style="width:100%;background:#ffdddd;">
Schließen ✖
</button>

<hr>

<p>Soll Stunden</p>
<input id="targetInput" type="number">
<button onclick="setTarget()">Speichern</button>

<p>Überstunden</p>
<input id="otInput" type="number">
<button onclick="setOT()">Speichern</button>

<p>Urlaub (Tage)</p>
<input id="vacInput" type="number">
<button onclick="setVac()">Speichern</button>

</div>
</div>

<script>

let startTime=null;
let endTime=null;
let pause=0;

let targetHours=25;
let overtime=0;
let vacation=0;

let entries=JSON.parse(localStorage.getItem("entries"))||[];

/* START */
function startWork(){
startTime=new Date();
document.getElementById("start").innerText=startTime.toLocaleTimeString();
calc();
}

/* END */
function endWork(){
endTime=new Date();
document.getElementById("end").innerText=endTime.toLocaleTimeString();
calc();
}

/* PAUSE */
function addPause(m){
pause+=m;
document.getElementById("pauseText").innerText=pause;
calc();
}

function resetPause(){
pause=0;
document.getElementById("pauseText").innerText=0;
calc();
}

/* LIVE */
function calc(){
if(!startTime){
document.getElementById("live").innerText="0.00 h";
return;
}

let e=endTime||new Date();
let h=(e-startTime)/1000/60/60 - pause/60;

if(h<0) h=0;

document.getElementById("live").innerText=h.toFixed(2)+" h";
}

/* SAVE */
function saveDay(){

if(!startTime||!endTime)return;

let h=(endTime-startTime)/1000/60/60 - pause/60;
if(h<0) h=0;

entries.unshift({
date:new Date().toLocaleDateString(),
start:startTime.toLocaleTimeString(),
end:endTime.toLocaleTimeString(),
pause:pause,
hours:h
});

save();
reset();
recalcAll();
}

/* RESET */
function reset(){
startTime=endTime=null;
pause=0;

document.getElementById("start").innerText="-";
document.getElementById("end").innerText="-";
document.getElementById("pauseText").innerText="0";
document.getElementById("live").innerText="0.00 h";
}

/* EDIT */
function edit(i){

let e=entries[i];

let d=prompt("Datum",e.date);
let s=prompt("Start",e.start);
let en=prompt("Ende",e.end);
let p=prompt("Pause",e.pause);

if(d) e.date=d;
if(s) e.start=s;
if(en) e.end=en;
if(p) e.pause=Number(p);

let a=new Date("2000/01/01 "+e.start);
let b=new Date("2000/01/01 "+e.end);

e.hours=((b-a)/1000/60/60)-(e.pause/60);

save();
recalcAll();
}

/* DELETE */
function del(i){
entries.splice(i,1);
save();
recalcAll();
}

/* ADMIN LOGIN */
function login(){
if(document.getElementById("pw").value==="0815"){
document.getElementById("panel").classList.remove("hidden");
}
}

/* CLOSE ADMIN */
function closeAdmin(){
document.getElementById("panel").classList.add("hidden");
}

/* SETTINGS */
function setTarget(){
targetHours=Number(document.getElementById("targetInput").value)||25;
recalcAll();
}

function setOT(){
overtime=Number(document.getElementById("otInput").value)||0;
recalcAll();
}

function setVac(){
vacation=Number(document.getElementById("vacInput").value)||0;
recalcAll();
}

/* SAVE */
function save(){
localStorage.setItem("entries",JSON.stringify(entries));
}

/* WEEK */
function recalcAll(){

let week=0;

entries.forEach(e=>{
week+=Number(e.hours)||0;
});

document.getElementById("week").innerText=week.toFixed(2);
document.getElementById("ot").innerText=(week-targetHours+overtime).toFixed(2);
document.getElementById("target").innerText=targetHours;
document.getElementById("vac").innerText=vacation;

render();
}

/* TABLE */
function render(){

let t=document.getElementById("table");
t.innerHTML="";

entries.forEach((e,i)=>{

t.innerHTML+=`
<tr>
<td>${e.date}</td>
<td>${e.start}</td>
<td>${e.end}</td>
<td>${e.pause}</td>
<td>${e.hours.toFixed(2)}</td>
<td>
<button onclick="edit(${i})">✏️</button>
<button onclick="del(${i})">🗑️</button>
</td>
</tr>
`;

});

}

recalcAll();

</script>

</body>
</html>
